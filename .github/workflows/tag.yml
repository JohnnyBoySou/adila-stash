name: Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump (ignorado se 'version' for preenchido)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Versão explícita no formato vX.Y.Z (sobrescreve 'bump')"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Create tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: compute
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$OVERRIDE" ]; then
            TAG="$OVERRIDE"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Versão inválida: '$TAG' (esperado vX.Y.Z)"
              exit 1
            fi
          else
            LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            LAST="${LAST:-v0.0.0}"
            IFS='.' read -r MA MI PA <<< "${LAST#v}"
            case "$BUMP" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              patch) PA=$((PA+1)) ;;
              *) echo "::error::bump inválido: $BUMP"; exit 1 ;;
            esac
            TAG="v${MA}.${MI}.${PA}"
          fi
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG já existe"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Próxima tag: $TAG"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  release:
    name: Trigger release
    needs: tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
